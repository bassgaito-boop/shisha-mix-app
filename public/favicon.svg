<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0d88a"/>
      <stop offset="100%" stop-color="#a87830"/>
    </linearGradient>
    <linearGradient id="gdLt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0d88a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="stG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a87830"/>
      <stop offset="40%"  stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="sm1" x1="10%" y1="100%" x2="0%"  y2="0%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sm2" x1="0%"  y1="100%" x2="0%"  y2="0%">
      <stop offset="0%"   stop-color="#f0d88a" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#f0d88a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sm3" x1="-10%" y1="100%" x2="0%"  y2="0%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="baseInt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#1a1308"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- 背景：rx縮小で角の白抜けを削減 -->
  <rect width="48" height="48" rx="4" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="47" height="47" rx="3.5"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.75"/>

  <!-- シーシャ本体：1.13倍に拡大（中心24,24から） -->
  <g transform="translate(-3, -3) scale(1.13)">

    <!-- 煙（金3本） -->
    <path d="M21 12 C19.5 9.5 20.5 7.5 20 5.5 C19.5 3.5 20.5 2 20 0.5"
          fill="none" stroke="url(#sm1)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M24 11.5 C22.5 8.8 24 6.5 23.5 4 C23 1.8 24.5 0.5 24 -0.5"
          fill="none" stroke="url(#sm2)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M27 12 C28.5 9.5 27.5 7.5 28 5.5 C28.5 3.5 27.5 2 28 0.5"
          fill="none" stroke="url(#sm3)" stroke-width="1.5" stroke-linecap="round"/>

    <!-- ボウル本体 -->
    <path d="M19.2 14 C19.2 11.5 24 11.2 24 11.2 C24 11.2 28.8 11.5 28.8 14 L27.4 18.4 Q24 19.2 20.6 18.4 Z"
          fill="url(#gdLt)"/>
    <!-- リム -->
    <ellipse cx="24" cy="14" rx="4.8" ry="1.1" fill="#f0d88a"/>
    <ellipse cx="24" cy="14" rx="4.8" ry="1.1" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
    <!-- スコアライン -->
    <line x1="22"   y1="14.5" x2="21.8" y2="18"   stroke="rgba(0,0,0,0.26)" stroke-width="0.7"/>
    <line x1="24"   y1="14"   x2="24"   y2="18.2"  stroke="rgba(0,0,0,0.26)" stroke-width="0.7"/>
    <line x1="26"   y1="14.5" x2="26.2" y2="18"    stroke="rgba(0,0,0,0.26)" stroke-width="0.7"/>
    <!-- ボウル下リング -->
    <rect x="21.6" y="18.2" width="4.8" height="1.2" rx="0.5" fill="#e8c97a"/>
    <rect x="21.6" y="18.2" width="4.8" height="1.2" rx="0.5" fill="none" stroke="#c9a84c" stroke-width="0.4"/>

    <!-- ステム -->
    <rect x="23" y="19.4" width="2" height="11.2" rx="0.6" fill="url(#stG)"/>
    <rect x="23.3" y="19.8" width="0.5" height="10.4" rx="0.25" fill="rgba(255,255,255,0.26)"/>
    <!-- デコリング -->
    <rect x="23" y="22.6" width="2" height="0.6" rx="0.3" fill="#c9a84c"/>
    <rect x="23" y="27.0" width="2" height="0.6" rx="0.3" fill="#c9a84c"/>

    <!-- フランジ -->
    <ellipse cx="24" cy="30.6" rx="5.0" ry="1.1" fill="url(#gdLt)"/>
    <ellipse cx="24" cy="30.6" rx="5.0" ry="1.1" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
    <ellipse cx="24" cy="31.2" rx="3.6" ry="0.7" fill="none" stroke="rgba(201,168,76,0.50)" stroke-width="0.5"/>

    <!-- ベース内部 -->
    <path d="M16.6 32 Q15.5 34.5 15.5 37.5 Q15.5 44 24 44.2 Q32.5 44 32.5 37.5 Q32.5 34.5 31.4 32 Z"
          fill="url(#baseInt)"/>
    <!-- ベース外枠 -->
    <path d="M16.6 32 Q15.5 34.5 15.5 37.5 Q15.5 44 24 44.2 Q32.5 44 32.5 37.5 Q32.5 34.5 31.4 32 Z"
          fill="none" stroke="url(#gd)" stroke-width="0.9"/>
    <!-- 横帯ライン -->
    <path d="M17.2 34.6 Q24 33.8 30.8 34.6" fill="none" stroke="rgba(201,168,76,0.50)" stroke-width="0.6"/>
    <path d="M16.2 38.0 Q24 37.2 31.8 38.0" fill="none" stroke="rgba(201,168,76,0.30)" stroke-width="0.6"/>
    <!-- 水面ライン -->
    <path d="M18.5 36.8 Q24 35.8 29.5 36.8" fill="none" stroke="#f0d88a" stroke-width="0.6" opacity="0.36"/>
    <!-- ベース底 -->
    <ellipse cx="24" cy="44.2" rx="6.5" ry="1.3" fill="url(#gd)" opacity="0.58"/>

    <!-- ホース差込口 -->
    <ellipse cx="31.2" cy="36.8" rx="1.4" ry="0.9" fill="url(#gdLt)"/>
    <ellipse cx="31.2" cy="36.8" rx="1.4" ry="0.9" fill="none" stroke="#c9a84c" stroke-width="0.4"/>
    <!-- ホース本体 -->
    <path d="M32.6 36.8 Q37.2 36.8 38.2 40.0 Q39.2 43.4 37 44.4"
          fill="none" stroke="url(#gd)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- マウスピース -->
    <ellipse cx="36.8" cy="44.6" rx="1.6" ry="1.0" fill="url(#gdLt)"/>
    <ellipse cx="36.8" cy="44.6" rx="1.6" ry="1.0" fill="none" stroke="#c9a84c" stroke-width="0.4"/>

  </g>
</svg>
