<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="bf" cx="35%" cy="55%" r="75%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#0e7490" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.3"/>
    </radialGradient>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0d88a"/>
      <stop offset="100%" stop-color="#a87830"/>
    </linearGradient>
    <linearGradient id="sm1" x1="0%" y1="100%" x2="10%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sm2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sm3" x1="0%" y1="100%" x2="-10%" y2="0%">
      <stop offset="0%"   stop-color="#f0d06a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f0d06a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="48" height="48" rx="7" fill="#0a0a0a"/>
  <!-- 細い白枠 -->
  <rect x="0.5" y="0.5" width="47" height="47" rx="6.5"
        fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="0.75"/>

  <!-- 煙 -->
  <path d="M21 12 Q19.5 9.5 20.5 7.5 Q21.5 5.5 20 3.5"  fill="none" stroke="url(#sm1)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M24 11.5 Q22.5 8.8 24 6.5 Q25.5 4.2 24 2"    fill="none" stroke="url(#sm2)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M27 12 Q28.5 9.5 27.5 7.5 Q26.5 5.5 28 3.5"  fill="none" stroke="url(#sm3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ボウル -->
  <path d="M19 14 Q19.2 11.5 24 11.5 Q28.8 11.5 29 14 L27.5 18.2 Q24 19 20.5 18.2 Z" fill="url(#gd)"/>
  <ellipse cx="24" cy="14" rx="5" ry="1.1" fill="#f0d88a"/>
  <rect x="21.5" y="18" width="5" height="1.2" rx="0.5" fill="#e8c97a"/>

  <!-- ステム -->
  <rect x="23" y="19.2" width="2.2" height="10.8" rx="0.7" fill="url(#gd)"/>

  <!-- フランジ -->
  <ellipse cx="24" cy="30" rx="5.2" ry="1.1" fill="url(#gd)"/>

  <!-- ベース内部 -->
  <path d="M16.5 31.2 Q15.5 33.5 15.5 36.5 Q15.5 43 24 43.2 Q32.5 43 32.5 36.5 Q32.5 33.5 31.5 31.2 Z"
        fill="url(#bf)"/>
  <!-- ベース外枠 -->
  <path d="M16.5 31.2 Q15.5 33.5 15.5 36.5 Q15.5 43 24 43.2 Q32.5 43 32.5 36.5 Q32.5 33.5 31.5 31.2 Z"
        fill="none" stroke="url(#gd)" stroke-width="0.9"/>
  <!-- 水面ライン -->
  <path d="M18.5 35.5 Q24 34.5 29.5 35.5" fill="none" stroke="#f0d88a" stroke-width="0.6" opacity="0.5"/>
  <!-- バブル -->
  <circle cx="21" cy="38.5" r="0.8" fill="#a855f7" opacity="0.4"/>
  <circle cx="24.5" cy="40"  r="0.7" fill="#22d3ee" opacity="0.4"/>
  <circle cx="27.5" cy="38" r="0.6" fill="#c9a84c" opacity="0.35"/>

  <!-- ベース底 -->
  <ellipse cx="24" cy="43.2" rx="6.5" ry="1.3" fill="url(#gd)" opacity="0.6"/>

  <!-- ホース -->
  <ellipse cx="31.2" cy="36" rx="1.5" ry="0.9" fill="#e8c97a"/>
  <path d="M32.7 36 Q37 36 38 39 Q39 42.5 37 43.5"
        fill="none" stroke="url(#gd)" stroke-width="1.4" stroke-linecap="round"/>
  <ellipse cx="36.8" cy="43.7" rx="1.7" ry="1" fill="#e8c97a"/>
</svg>
