<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>

  <!-- 煙 -->
  <path d="M256 80 Q240 55 256 35 Q272 15 256 0" fill="none" stroke="#c9a84c" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <path d="M232 88 Q210 63 226 40 Q242 17 222 0" fill="none" stroke="#c9a84c" stroke-width="7" stroke-linecap="round" opacity="0.3"/>

  <!-- ボウル（上部） -->
  <path d="M216 112 Q216 92 256 92 Q296 92 296 112 L284 158 Q256 164 228 158 Z" fill="#c9a84c"/>
  <!-- ボウル底リング -->
  <rect x="228" y="156" width="56" height="10" rx="4" fill="#e8c97a"/>

  <!-- ステム（中央の細長いパイプ） -->
  <rect x="248" y="166" width="16" height="140" rx="6" fill="#c9a84c"/>

  <!-- プレート（ステムとベースの接続部） -->
  <rect x="220" y="298" width="72" height="14" rx="5" fill="#e8c97a"/>

  <!-- ベース（水タンク） -->
  <path d="M186 312 Q180 330 180 360 Q180 415 256 418 Q332 415 332 360 Q332 330 326 312 Z" fill="none" stroke="#c9a84c" stroke-width="12" stroke-linejoin="round"/>
  <!-- ベース内の水（光沢） -->
  <path d="M200 345 Q256 335 312 345" fill="none" stroke="#c9a84c" stroke-width="4" opacity="0.4"/>

  <!-- ベース底 -->
  <ellipse cx="256" cy="418" rx="60" ry="16" fill="#c9a84c" opacity="0.5"/>

  <!-- ホース差し込み口 -->
  <ellipse cx="320" cy="350" rx="12" ry="8" fill="#c9a84c"/>
  <!-- ホース -->
  <path d="M332 350 Q390 350 400 390 Q410 430 380 440" fill="none" stroke="#c9a84c" stroke-width="11" stroke-linecap="round"/>
  <!-- マウスピース -->
  <ellipse cx="378" cy="441" rx="14" ry="9" fill="#c9a84c"/>
</svg>
