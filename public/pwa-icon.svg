    <ellipse cx="256" cy="151" rx="51" ry="11" fill="#f0d88a"/>
    <ellipse cx="256" cy="151" rx="51" ry="11" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <ellipse cx="256" cy="152" rx="40" ry="7" fill="rgba(0,0,0,0.26)"/>
