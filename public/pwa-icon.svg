    <ellipse cx="400" cy="475" rx="18" ry="11" fill="url(#goldLt)"/>
    <ellipse cx="400" cy="475" rx="18" ry="11" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <ellipse cx="400" cy="475" rx="11" ry="6.5" fill="none" stroke="rgba(201,168,76,0.44)" stroke-width="1"/>

