    <rect x="246" y="204" width="4"  height="114" rx="2" fill="rgba(0,0,0,0.22)"/>
    <rect x="262" y="204" width="4"  height="114" rx="2" fill="rgba(0,0,0,0.10)"/>
    <rect x="252" y="208" width="4"  height="106" rx="2" fill="rgba(255,255,255,0.24)"/>
    <rect x="246" y="243" width="20" height="6" rx="2.5" fill="#c9a84c"/>
    <rect x="247" y="244" width="18" height="2.5" rx="1" fill="rgba(255,255,255,0.30)"/>
