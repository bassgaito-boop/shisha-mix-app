    <ellipse cx="256" cy="322" rx="42" ry="7.5" fill="rgba(0,0,0,0.18)"/>
    <ellipse cx="256" cy="322" rx="42" ry="7.5" fill="none" stroke="rgba(201,168,76,0.55)" stroke-width="1"/>

